version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: dashboard_mongo_dev
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_dev_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: dashboard_mongo_express
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: 'false'
    ports:
      - '8081:8081'

volumes:
  mongo_dev_data:
